<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>XOX Game</title>

    <link href="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css)" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .game-card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 380px; /* Slightly wider to accommodate mode selection */
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
        }

        .mode-selection {
            margin-bottom: 20px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .cell {
            width: 90px;
            height: 90px;
            font-size: 30px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f1f1f1;
            cursor: pointer;
            border-radius: 10px;
        }

        .cell:hover {
            background: #ddd;
        }

        .btn-custom {
            background-color: #667eea;
            color: white;
        }

        .btn-custom:hover {
            background-color: #5a67d8;
        }
    </style>
</head>

<body>

    <div class="game-card">
        <h3>❌⭕ Tic-Tac-Toe</h3>

        <div class="mode-selection">
            <p class="mb-2">Choose Game Mode:</p>
            <button class="btn btn-outline-primary me-2" onclick="setGameMode('manual')">🧑‍🤝‍🧑 Manual (2 Players)</button>
            <button class="btn btn-outline-success" onclick="setGameMode('computer')">🤖 Vs. Computer</button>
        </div>

        <div id="game-container" style="display: none;">
            <p>Current Turn: <b id="turn">X</b></p>

            <div class="board" id="board">
                <div class="cell" onclick="makeMove(0)"></div>
                <div class="cell" onclick="makeMove(1)"></div>
                <div class="cell" onclick="makeMove(2)"></div>
                <div class="cell" onclick="makeMove(3)"></div>
                <div class="cell" onclick="makeMove(4)"></div>
                <div class="cell" onclick="makeMove(5)"></div>
                <div class="cell" onclick="makeMove(6)"></div>
                <div class="cell" onclick="makeMove(7)"></div>
                <div class="cell" onclick="makeMove(8)"></div>
            </div>

            <p id="message" class="mt-3 fw-bold"></p>

            <button class="btn btn-custom w-100 mt-3" onclick="restartGame()">Restart</button>
        </div>
    </div>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;
        let gameMode = "manual"; // "manual" or "computer"

        const winningPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        // Function to set game mode
        function setGameMode(mode) {
            gameMode = mode;
            document.querySelector('.mode-selection').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            restartGame(); // Start a new game with the chosen mode
        }

        // Handles a player's move (human or computer)
        function makeMove(index) {
            if (board[index] !== "" || !gameActive || (gameMode === "computer" && currentPlayer === "O")) {
                return; // Prevent making a move if cell is taken, game is over, or it's the AI's turn
            }

            placeMark(index);

            // If it's a computer game and the current player is X, initiate computer move after a short delay
            if (gameActive && gameMode === "computer" && currentPlayer === "O") {
                setTimeout(computerMove, 500); // Give a slight delay for visual effect
            }
        }

        // Places X or O on the board and updates game state
        function placeMark(index) {
            board[index] = currentPlayer;
            document.getElementsByClassName("cell")[index].innerText = currentPlayer;

            if (checkWinner()) {
                document.getElementById("message").innerText = `🎉 Player ${board[index]} Wins!`;
                gameActive = false;
                return;
            }

            if (!board.includes("")) {
                document.getElementById("message").innerText = "🤝 It's a Draw!";
                gameActive = false;
                return;
            }

            switchPlayer();
        }

        // Switches current player and updates the turn display
        function switchPlayer() {
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            document.getElementById("turn").innerText = currentPlayer;
        }

        // Checks for a win condition
        function checkWinner() {
            for (let pattern of winningPatterns) {
                let [a, b, c] = pattern;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return true;
                }
            }
            return false;
        }

        // Computer's move logic (simple AI)
        function computerMove() {
            if (!gameActive) return;

            let availableMoves = [];
            for (let i = 0; i < board.length; i++) {
                if (board[i] === "") {
                    availableMoves.push(i);
                }
            }

            if (availableMoves.length > 0) {
                // Simple AI: Prioritize winning moves, then blocking moves, then random
                let bestMove = -1;

                // 1. Check for winning move for 'O'
                for (let move of availableMoves) {
                    board[move] = "O";
                    if (checkWinner()) {
                        bestMove = move;
                        board[move] = ""; // backtrack
                        break;
                    }
                    board[move] = ""; // backtrack
                }

                if (bestMove === -1) {
                    // 2. Check for blocking move against 'X'
                    for (let move of availableMoves) {
                        board[move] = "X";
                        if (checkWinner()) {
                            bestMove = move;
                            board[move] = ""; // backtrack
                            break;
                        }
                        board[move] = ""; // backtrack
                    }
                }

                // 3. Fallback to center, then corners, then sides
                if (bestMove === -1) {
                    if (availableMoves.includes(4)) { // Center
                        bestMove = 4;
                    } else if (availableMoves.includes(0)) { // Corners
                        bestMove = 0;
                    } else if (availableMoves.includes(2)) {
                        bestMove = 2;
                    } else if (availableMoves.includes(6)) {
                        bestMove = 6;
                    } else if (availableMoves.includes(8)) {
                        bestMove = 8;
                    } else { // Random edge
                        bestMove = availableMoves[Math.floor(Math.random() * availableMoves.length)];
                    }
                }

                placeMark(bestMove);
            }
        }


        // Resets the game to its initial state
        function restartGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;

            document.getElementById("turn").innerText = "X";
            document.getElementById("message").innerText = "";

            let cells = document.getElementsByClassName("cell");
            for (let cell of cells) {
                cell.innerText = "";
            }
        }

            // If playing against the computer and computer is 'O' and 'X' plays first, no immediate computer move.
            // If the
